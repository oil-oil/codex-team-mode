<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Dev Team for Codex</title>
  <desc id="desc">A main Codex thread routes bounded repository work to Explorer, Executor, Complex Executor, and an independent Reviewer.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#20242d" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="30" fill="#0b0d12"/>
  <rect x="620" width="580" height="420" fill="url(#grid)" opacity="0.75"/>
  <path d="M620 0V420" stroke="#292e39"/>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="64" y="66" fill="#8b93a5" font-size="15" font-weight="700" letter-spacing="3">CODEX / SUBAGENT ROUTER</text>
    <text x="60" y="164" fill="#f7f4ec" font-size="86" font-weight="800" letter-spacing="-4">DEV TEAM</text>
    <text x="64" y="213" fill="#c3c8d2" font-size="22">Keep the main thread in charge.</text>
    <text x="64" y="245" fill="#c3c8d2" font-size="22">Route bounded work. Review without inherited context.</text>

    <g transform="translate(64 294)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <rect width="222" height="42" rx="21" fill="#171b23" stroke="#3d4658"/>
      <circle cx="23" cy="21" r="5" fill="#9fe870"/>
      <text x="39" y="27" fill="#f7f4ec" font-size="15">fork_turns="none"</text>
    </g>
    <g transform="translate(300 294)">
      <rect width="174" height="42" rx="21" fill="#f7f4ec"/>
      <text x="22" y="27" fill="#0b0d12" font-size="15" font-weight="750">4 focused agents</text>
    </g>
    <text x="64" y="378" fill="#70798d" font-size="14" letter-spacing="1.4">DECISIONS STAY CENTRAL · EXECUTION STAYS BOUNDED</text>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <g transform="translate(746 38)">
      <rect width="328" height="70" rx="18" fill="#f7f4ec"/>
      <circle cx="35" cy="35" r="15" fill="#0b0d12"/>
      <path d="M29 35h12M35 29v12" stroke="#f7f4ec" stroke-width="2" stroke-linecap="round"/>
      <text x="64" y="31" fill="#0b0d12" font-size="15" font-weight="750">MAIN THREAD</text>
      <text x="64" y="51" fill="#5f6674" font-size="13">intent · decisions · acceptance</text>
    </g>

    <path d="M910 108V133M910 133H723V151M910 133H1097V151M910 133V260M910 235H723V260M910 235H1097V260" fill="none" stroke="#4a5365" stroke-width="2"/>
    <circle cx="910" cy="133" r="5" fill="#f7f4ec"/>
    <circle cx="910" cy="235" r="5" fill="#f7f4ec"/>

    <g transform="translate(638 151)">
      <rect width="170" height="74" rx="16" fill="#121824" stroke="#7aa2ff"/>
      <text x="18" y="31" fill="#dce6ff" font-size="17" font-weight="750">Explorer</text>
      <text x="18" y="53" fill="#7aa2ff" font-size="12">LUNA · READ ONLY</text>
    </g>
    <g transform="translate(1012 151)">
      <rect width="170" height="74" rx="16" fill="#151c17" stroke="#9fe870"/>
      <text x="18" y="31" fill="#e7fbd7" font-size="17" font-weight="750">Executor</text>
      <text x="18" y="53" fill="#9fe870" font-size="12">LUNA · WRITE</text>
    </g>
    <g transform="translate(638 260)">
      <rect width="170" height="82" rx="16" fill="#201b12" stroke="#ffcf70"/>
      <text x="18" y="30" fill="#fff1ca" font-size="15" font-weight="750">Complex Executor</text>
      <text x="18" y="55" fill="#ffcf70" font-size="12">SOL · WRITE</text>
    </g>
    <g transform="translate(1000 248)">
      <rect width="194" height="106" rx="18" fill="#191522" stroke="#d2a8ff" stroke-width="2" stroke-dasharray="7 6"/>
      <text x="20" y="34" fill="#f2e7ff" font-size="17" font-weight="750">Reviewer</text>
      <text x="20" y="57" fill="#d2a8ff" font-size="12">SOL · READ ONLY</text>
      <rect x="20" y="71" width="124" height="23" rx="11.5" fill="#d2a8ff"/>
      <text x="33" y="87" fill="#191522" font-size="11" font-weight="800">NO HISTORY</text>
    </g>
  </g>
</svg>

