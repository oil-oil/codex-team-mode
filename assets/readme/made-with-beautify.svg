<svg xmlns="http://www.w3.org/2000/svg" width="420" height="64" viewBox="0 0 420 64" role="img" aria-labelledby="title desc">
  <title id="title">README made with beautify-github-readme</title>
  <desc id="desc">A compact warm-white signature with four colored Team Mode role tiles and an outbound-link arrow.</desc>

  <rect x="0.75" y="0.75" width="418.5" height="62.5" rx="17.25" fill="#f7f4ec" stroke="#ded8ca" stroke-width="1.5"/>

  <g id="team-mode-mark" transform="translate(14 11)">
    <rect width="42" height="42" rx="13" fill="#0b0d12"/>
    <rect x="9" y="9" width="10" height="10" rx="3" fill="#7aa2ff"/>
    <rect x="23" y="9" width="10" height="10" rx="3" fill="#9fe870"/>
    <rect x="9" y="23" width="10" height="10" rx="3" fill="#ffcf70"/>
    <rect x="23" y="23" width="10" height="10" rx="3" fill="#d2a8ff"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
    <text x="69" y="24" fill="#747b88" font-size="10.5" font-weight="760" letter-spacing="1.5">README MADE WITH</text>
    <text x="69" y="45" fill="#0b0d12" font-size="17" font-weight="820">beautify-github-readme</text>
  </g>

  <g id="outbound-link" transform="translate(369 15)">
    <circle cx="17" cy="17" r="17" fill="#0b0d12"/>
    <path d="M11 23 23 11M15 11h8v8" fill="none" stroke="#f7f4ec" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
